<style>
:root{
  --bg:#fff8f2;--border:#e8d8cc;--accent:#c8709a;--accent2:#6ab8a0;
  --gold:#e8a030;--text:#3a2a36;--muted:#a08898;--shadow:rgba(180,120,140,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Gowun Dodum',sans-serif;}
#app{display:flex;flex-direction:column;height:100%;}

/* ── 헤더 ── */
#header{flex-shrink:0;z-index:20;background:rgba(255,252,250,0.97);border-bottom:1.5px solid var(--border);box-shadow:0 2px 10px var(--shadow);}

/* 공통 행 */
.hrow{display:flex;align-items:center;padding:4px 8px;gap:4px;border-bottom:1px solid var(--border);}
.hrow:last-child{border-bottom:none;}

/* 구분선 */
.vline{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 2px;}

/* 로고 */
.logo{font-family:'Nanum Myeongjo',serif;font-size:14px;font-weight:700;color:var(--accent);white-space:nowrap;flex-shrink:0;line-height:1.1;}
.logo small{display:block;font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}

/* 대칭 pill */
.pill{height:22px;padding:0 6px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;touch-action:manipulation;-webkit-user-select:none;}
.pill.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:bold;}

/* 아이콘 버튼 (브러시, 글로우) */
.ibtn{width:26px;height:22px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;padding:0;touch-action:manipulation;-webkit-user-select:none;}
.ibtn.active{background:var(--accent2);border-color:var(--accent2);color:#0a2820;}

/* 색상 dot */
.dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;touch-action:manipulation;transition:transform 0.1s;}
.dot.active{border-color:white;transform:scale(1.2);}

/* 배경 swatch */
.bgsw{width:16px;height:16px;border-radius:3px;cursor:pointer;border:2px solid transparent;flex-shrink:0;touch-action:manipulation;transition:transform 0.1s;}
.bgsw.active{border-color:white;transform:scale(1.15);}

/* 슬라이더 */
input[type=range]{-webkit-appearance:none;width:60px;height:3px;background:var(--border);border-radius:2px;outline:none;flex-shrink:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;}

/* 컬러피커 */
input[type=color]{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);cursor:pointer;padding:0;background:none;flex-shrink:0;}
.bginput{border-radius:3px!important;}

/* 액션 버튼 */
.act{height:24px;padding:0 8px;border-radius:5px;border:1px solid var(--border);background:transparent;font-family:'Gowun Dodum',sans-serif;font-size:11px;color:var(--text);cursor:pointer;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:2px;touch-action:manipulation;-webkit-user-select:none;}
.act.primary{background:var(--gold);border-color:var(--gold);color:#2a1a00;font-weight:bold;}

/* 언어 버튼 */
.lbtn{height:20px;padding:0 5px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:10px;color:var(--muted);cursor:pointer;flex-shrink:0;touch-action:manipulation;-webkit-user-select:none;}
.lbtn.active{background:var(--accent2);border-color:var(--accent2);color:white;}

.sp{flex:1;}

/* ── 캔버스 ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:linear-gradient(135deg,#fff4f8,#f0f8ff,#f8fff4);transition:background 0.5s;touch-action:none;}
#canvas,#guide-canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;}
#canvas{cursor:crosshair;touch-action:none;z-index:2;}
#guide-canvas{pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:3;}
#canvas-wrap.drawing #guide-canvas{opacity:0.4;}
#sym-badge{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(255,252,250,0.9);border:1.5px solid var(--border);border-radius:20px;padding:2px 12px;font-family:'Nanum Myeongjo',serif;font-size:11px;color:var(--accent);pointer-events:none;z-index:5;white-space:nowrap;}
#replay-hud{display:none;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(255,252,250,0.93);border:1.5px solid var(--border);border-radius:30px;padding:6px 14px;z-index:10;align-items:center;gap:8px;white-space:nowrap;}
#replay-hud.show{display:flex;}
.hud-msg{font-family:'Nanum Myeongjo',serif;font-size:12px;color:var(--accent);}
.hud-bar-wrap{width:80px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.hud-bar{height:100%;background:var(--accent);width:0%;transition:width 0.06s linear;}
.hud-stop{background:none;border:1px solid var(--border);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--muted);cursor:pointer;touch-action:manipulation;}

/* ── 광고 ── */
#ad-banner{flex-shrink:0;background:#fff;border-top:1px solid var(--border);height:50px;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* ── 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(180,140,160,0.4);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
@keyframes popIn{from{transform:scale(0.88);opacity:0;}to{transform:scale(1);opacity:1;}}
.save-box{background:#fff8f4;border:1.5px solid var(--border);border-radius:18px;padding:22px 20px 16px;width:min(360px,92vw);text-align:center;box-shadow:0 20px 60px var(--shadow);animation:popIn 0.25s ease;}
.modal-title{font-family:'Nanum Myeongjo',serif;font-size:18px;color:var(--accent);margin-bottom:4px;}
.modal-sub{font-size:10px;color:var(--muted);margin-bottom:12px;}
#modal-ad{width:100%;height:90px;overflow:hidden;margin-bottom:12px;background:#f5eef0;border-radius:6px;display:flex;align-items:center;justify-content:center;}
.modal-btns{display:flex;gap:8px;}
.modal-btn{flex:1;height:42px;border-radius:10px;border:1.5px solid var(--border);background:white;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;color:var(--text);touch-action:manipulation;}
.modal-btn.go{background:var(--accent);border-color:var(--accent);color:white;font-weight:bold;}
.gallery-box{background:#fff8f4;border:1.5px solid var(--border);border-radius:18px;padding:20px;width:min(560px,94vw);max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px var(--shadow);animation:popIn 0.25s ease;}
.gallery-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.gallery-hd span{font-family:'Nanum Myeongjo',serif;font-size:16px;color:var(--accent);}
.gallery-hd button{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:6px;touch-action:manipulation;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
.g-item{border-radius:8px;overflow:hidden;border:1.5px solid var(--border);cursor:pointer;position:relative;aspect-ratio:1;background:var(--bg);}
.g-item img{width:100%;height:100%;object-fit:cover;display:block;}
.g-del{position:absolute;top:3px;right:3px;width:22px;height:22px;background:rgba(255,255,255,0.92);border:none;border-radius:50%;color:#c04060;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;touch-action:manipulation;}
.g-item:hover .g-del,.g-item:active .g-del{opacity:1;}
.g-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 0;line-height:2;}
.confirm-box{background:#fff8f4;border:1.5px solid var(--border);border-radius:14px;padding:22px 20px;width:min(280px,88vw);text-align:center;box-shadow:0 10px 40px var(--shadow);animation:popIn 0.2s ease;}
.confirm-ico{font-size:30px;margin-bottom:8px;}
.confirm-ttl{font-size:14px;color:var(--text);margin-bottom:4px;font-weight:bold;}
.confirm-sub{font-size:10px;color:var(--muted);margin-bottom:16px;}
.confirm-row{display:flex;gap:8px;}
.c-btn{flex:1;height:40px;border-radius:10px;border:1.5px solid var(--border);background:white;font-family:'Gowun Dodum',sans-serif;font-size:13px;cursor:pointer;color:var(--text);touch-action:manipulation;}
.c-btn.red{background:#fff0f0;border-color:#f0c0c0;color:#c04060;}
.c-btn.red:active{background:#c04060;border-color:#c04060;color:white;}
</style>
</head>
<body>
<div id="app">

<div id="header">
  <!-- 1줄: 로고 | 대칭 | 브러시 -->
  <div class="hrow">
    <div class="logo">꽃피움<small>KKOTPIUM</small></div>
    <div class="vline"></div>
    <button class="pill active" data-sym="2">2</button>
    <button class="pill" data-sym="4">4</button>
    <button class="pill" data-sym="6">6</button>
    <button class="pill" data-sym="8">8</button>
    <button class="pill" data-sym="12">12</button>
    <button class="pill" data-sym="16" id="mandala-btn">만다라</button>
    <div class="vline"></div>
    <button class="ibtn active" data-brush="normal">✏️</button>
    <button class="ibtn" data-brush="dotted">···</button>
    <button class="ibtn" data-brush="star">★</button>
    <button class="ibtn" data-brush="flower">✿</button>
    <button class="ibtn" data-brush="wave">〜</button>
  </div>

  <!-- 2줄: 색상 | 배경 | 굵기 | 글로우 | spacer | 액션 | 언어 -->
  <div class="hrow">
    <div class="dot active" style="background:#c8709a" data-color="#c8709a"></div>
    <div class="dot" style="background:#70a8c8" data-color="#70a8c8"></div>
    <div class="dot" style="background:#70b890" data-color="#70b890"></div>
    <div class="dot" style="background:#c89040" data-color="#c89040"></div>
    <div class="dot" style="background:#a070c8" data-color="#a070c8"></div>
    <div class="dot" style="background:#3a2a36" data-color="#3a2a36"></div>
    <input type="color" id="custom-color" value="#c8709a">
    <div class="vline"></div>
    <div class="bgsw active" data-bg="petal" style="background:linear-gradient(135deg,#fff4f8,#ffeef8)"></div>
    <div class="bgsw" data-bg="sky" style="background:linear-gradient(135deg,#f0f8ff,#e8f4ff)"></div>
    <div class="bgsw" data-bg="meadow" style="background:linear-gradient(135deg,#f0fff4,#e8faf0)"></div>
    <div class="bgsw" data-bg="sunrise" style="background:linear-gradient(135deg,#fff8f0,#ffeedd)"></div>
    <div class="bgsw" data-bg="lavender" style="background:linear-gradient(135deg,#f8f0ff,#f0e8ff)"></div>
    <div class="bgsw" data-bg="cream" style="background:#fffdf8;box-shadow:inset 0 0 0 1px #e0d8c8"></div>
    <input type="color" id="custom-bg" value="#fff4f8" class="bginput">
    <div class="vline"></div>
    <input type="range" id="brush-size" min="1" max="28" value="4">
    <button class="ibtn" id="glow-btn">✨</button>
    <div class="sp"></div>
    <button class="act" id="replay-btn">▶ <span id="lbl-replay">재생</span></button>
    <button class="act" id="gallery-btn">🖼</button>
    <button class="act" id="undo-btn">↩</button>
    <button class="act primary" id="save-btn">💾 <span id="lbl-save">저장</span></button>
    <button class="act" id="clear-btn">🗑️</button>
    <div class="vline"></div>
    <button class="lbtn active" id="lang-ko">KO</button>
    <button class="lbtn" id="lang-en">EN</button>
  </div>
</div>

<!-- 캔버스 -->
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <canvas id="guide-canvas"></canvas>
  <div id="sym-badge">2축 대칭</div>
  <div id="replay-hud">
    <span class="hud-msg" id="hud-msg">🌸 피어나는 중...</span>
    <div class="hud-bar-wrap"><div class="hud-bar" id="replay-bar"></div></div>
    <button class="hud-stop" id="replay-stop">■ <span id="lbl-stop">중지</span></button>
  </div>
</div>

<!-- 광고 -->
<div id="ad-banner">
  <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-app-pub-4000516474813651~4265923929" data-ad-slot="5077580785"></ins>
  <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>

</div>

<!-- 저장 모달 -->
<div class="modal-bg" id="save-modal">
  <div class="save-box">
    <div class="modal-title" id="save-title">🌸 작품을 저장할게요</div>
    <div class="modal-sub" id="save-sub">저장하기를 눌러주세요</div>
    <div id="modal-ad">
      <ins class="adsbygoogle" style="display:inline-block;width:300px;height:90px" data-ad-client="ca-app-pub-4000516474813651~4265923929" data-ad-slot="8230053813"></ins>
      <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
    </div>
    <div class="modal-btns">
      <button class="modal-btn" id="save-cancel">취소</button>
      <button class="modal-btn go" id="save-confirm">💾 저장하기</button>
    </div>
  </div>
</div>

<!-- 갤러리 모달 -->
<div class="modal-bg" id="gallery-modal">
  <div class="gallery-box">
    <div class="gallery-hd">
      <span id="gallery-title">🖼 내 작품 보관함</span>
      <button id="gallery-close">✕</button>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</div>

<!-- 지우기 확인 -->
<div class="modal-bg" id="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-ico">🗑️</div>
    <div class="confirm-ttl" id="confirm-ttl">캔버스를 지울까요?</div>
    <div class="confirm-sub" id="confirm-sub">지우면 되돌릴 수 없어요</div>
    <div class="confirm-row">
      <button class="c-btn" id="confirm-no">취소</button>
      <button class="c-btn red" id="confirm-yes">지우기</button>
    </div>
  </div>
</div>

<script>
const T={
  ko:{sym:{2:'2축 대칭',4:'4축 대칭',6:'6축 대칭',8:'8축 대칭',12:'12축 대칭',16:'만다라 🌸'},mandalaBtn:'만다라',replay:'재생',save:'저장',stop:'중지',hudMsg:'🌸 피어나는 중...',saveTitle:'🌸 작품을 저장할게요',saveSub:'저장하기를 눌러주세요',saveCancel:'취소',saveConfirm:'💾 저장하기',galleryTitle:'🖼 내 작품 보관함',galleryEmpty:'🌸 아직 저장된 작품이 없어요<br>그림을 그리고 저장해보세요',confirmTtl:'캔버스를 지울까요?',confirmSub:'지우면 되돌릴 수 없어요',confirmNo:'취소',confirmYes:'지우기',noStroke:'먼저 그림을 그려보세요! 🌸'},
  en:{sym:{2:'2-Axis',4:'4-Axis',6:'6-Axis',8:'8-Axis',12:'12-Axis',16:'Mandala 🌸'},mandalaBtn:'Mandala',replay:'Play',save:'Save',stop:'Stop',hudMsg:'🌸 Blooming...',saveTitle:'🌸 Save Your Art',saveSub:'Tap Save to continue',saveCancel:'Cancel',saveConfirm:'💾 Save',galleryTitle:'🖼 My Gallery',galleryEmpty:'🌸 No artworks yet<br>Draw something and save it!',confirmTtl:'Clear canvas?',confirmSub:'This cannot be undone',confirmNo:'Cancel',confirmYes:'Clear',noStroke:'Draw something first! 🌸'}
};
let lang='ko';

function applyLang(){
  const L=T[lang];
  document.getElementById('mandala-btn').textContent=L.mandalaBtn;
  document.getElementById('lbl-replay').textContent=L.replay;
  document.getElementById('lbl-save').textContent=L.save;
  document.getElementById('lbl-stop').textContent=L.stop;
  document.getElementById('hud-msg').textContent=L.hudMsg;
  document.getElementById('save-title').textContent=L.saveTitle;
  document.getElementById('save-sub').textContent=L.saveSub;
  document.getElementById('save-cancel').textContent=L.saveCancel;
  document.getElementById('save-confirm').textContent=L.saveConfirm;
  document.getElementById('gallery-title').textContent=L.galleryTitle;
  document.getElementById('confirm-ttl').textContent=L.confirmTtl;
  document.getElementById('confirm-sub').textContent=L.confirmSub;
  document.getElementById('confirm-no').textContent=L.confirmNo;
  document.getElementById('confirm-yes').textContent=L.confirmYes;
  badge.textContent=L.sym[S.sym]||S.sym;
}
document.getElementById('lang-ko').addEventListener('click',()=>{lang='ko';document.getElementById('lang-ko').classList.add('active');document.getElementById('lang-en').classList.remove('active');applyLang();});
document.getElementById('lang-en').addEventListener('click',()=>{lang='en';document.getElementById('lang-en').classList.add('active');document.getElementById('lang-ko').classList.remove('active');applyLang();});

const BG={petal:{css:'linear-gradient(135deg,#fff4f8,#ffeef8)',fill:'#fff4f8'},sky:{css:'linear-gradient(135deg,#f0f8ff,#e8f4ff)',fill:'#f0f8ff'},meadow:{css:'linear-gradient(135deg,#f0fff4,#e8faf0)',fill:'#f0fff4'},sunrise:{css:'linear-gradient(135deg,#fff8f0,#ffeedd)',fill:'#fff8f0'},lavender:{css:'linear-gradient(135deg,#f8f0ff,#f0e8ff)',fill:'#f8f0ff'},cream:{css:'#fffdf8',fill:'#fffdf8'}};

const S={sym:2,color:'#c8709a',brushSize:4,brushType:'normal',bgKey:'petal',glow:false,drawing:false,lastX:null,lastY:null,history:[],snap:null,strokes:[],currentStroke:null,gallery:[]};
try{S.gallery=JSON.parse(localStorage.getItem('kkotpium-v3')||'[]');}catch(e){}

const wrap=document.getElementById('canvas-wrap');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const guide=document.getElementById('guide-canvas');
const gctx=guide.getContext('2d');
const badge=document.getElementById('sym-badge');

function resize(){
  const w=wrap.offsetWidth,h=wrap.offsetHeight;
  if(!w||!h)return;
  let img=null;
  if(canvas.width&&canvas.height){try{img=ctx.getImageData(0,0,canvas.width,canvas.height);}catch(e){}}
  canvas.width=guide.width=w;canvas.height=guide.height=h;
  if(img)ctx.putImageData(img,0,0);
  drawGuides();
}
function drawGuides(){
  const w=guide.width,h=guide.height,cx=w/2,cy=h/2;
  gctx.clearRect(0,0,w,h);gctx.strokeStyle=S.color;gctx.lineWidth=0.5;gctx.setLineDash([4,8]);
  for(let i=0;i<S.sym;i++){const a=(Math.PI*2*i)/S.sym,len=Math.hypot(w,h);gctx.beginPath();gctx.moveTo(cx,cy);gctx.lineTo(cx+Math.cos(a)*len,cy+Math.sin(a)*len);gctx.stroke();}
  gctx.setLineDash([]);
}

function drawStar(c,cx,cy,r,color,alpha,glow){c.save();c.globalAlpha=alpha;c.fillStyle=color;c.shadowBlur=glow?r*2:0;c.shadowColor=color;c.beginPath();for(let i=0;i<10;i++){const a=(Math.PI/5)*i-Math.PI/2,rad=i%2===0?r:r*0.42;i===0?c.moveTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad):c.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);}c.closePath();c.fill();c.restore();}
function drawFlower(c,cx,cy,r,color,alpha,glow){c.save();c.globalAlpha=alpha;c.fillStyle=color;c.shadowBlur=glow?r*2:0;c.shadowColor=color;for(let i=0;i<6;i++){const a=(Math.PI*2/6)*i,px=cx+Math.cos(a)*r*0.52,py=cy+Math.sin(a)*r*0.52;c.beginPath();c.ellipse(px,py,r*0.4,r*0.22,a,0,Math.PI*2);c.fill();}c.beginPath();c.arc(cx,cy,r*0.2,0,Math.PI*2);c.fill();c.restore();}
function stampSym(c,x,y,sym,bType,size,color,glow){const cw=c.canvas.width,ch=c.canvas.height,cx=cw/2,cy=ch/2,dx=x-cx,dy=y-cy,r=size*1.5,alpha=0.88;for(let i=0;i<sym;i++){const a=(Math.PI*2*i)/sym,cos=Math.cos(a),sin=Math.sin(a);const rx=cx+dx*cos-dy*sin,ry=cy+dx*sin+dy*cos,mx=cx+dx*cos+dy*sin,my=cy+dx*sin-dy*cos;if(bType==='star'){drawStar(c,rx,ry,r,color,alpha,glow);drawStar(c,mx,my,r,color,alpha,glow);}else{drawFlower(c,rx,ry,r,color,alpha,glow);drawFlower(c,mx,my,r,color,alpha,glow);}}}
let waveT=0;
function drawWave(c,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);if(len<0.5)return;const nx=-dy/len,ny=dx/len,amp=c.lineWidth*2;waveT+=0.3;const steps=Math.max(3,Math.ceil(len/2));c.beginPath();for(let s=0;s<=steps;s++){const t=s/steps,w=Math.sin(t*Math.PI*4+waveT)*amp;s===0?c.moveTo(x1+dx*t+nx*w,y1+dy*t+ny*w):c.lineTo(x1+dx*t+nx*w,y1+dy*t+ny*w);}c.stroke();}
function drawSymLine(c,x1,y1,x2,y2,sym,bType,size,color,glow){const cw=c.canvas.width,ch=c.canvas.height,cx=cw/2,cy=ch/2;const dx1=x1-cx,dy1=y1-cy,dx2=x2-cx,dy2=y2-cy;c.lineCap='round';c.lineJoin='round';c.strokeStyle=color;c.setLineDash([]);c.shadowBlur=0;if(bType==='dotted'){c.setLineDash([2,size*2.2]);c.lineWidth=size*0.8;c.globalAlpha=0.95;}else{c.lineWidth=size;c.globalAlpha=0.88;}if(glow){c.shadowBlur=size*3.5;c.shadowColor=color;}for(let i=0;i<sym;i++){const a=(Math.PI*2*i)/sym,cos=Math.cos(a),sin=Math.sin(a);const rx1=cx+dx1*cos-dy1*sin,ry1=cy+dx1*sin+dy1*cos,rx2=cx+dx2*cos-dy2*sin,ry2=cy+dx2*sin+dy2*cos;const mx1=cx+dx1*cos+dy1*sin,my1=cy+dx1*sin-dy1*cos,mx2=cx+dx2*cos+dy2*sin,my2=cy+dx2*sin-dy2*cos;if(bType==='wave'){drawWave(c,rx1,ry1,rx2,ry2);drawWave(c,mx1,my1,mx2,my2);}else{c.beginPath();c.moveTo(rx1,ry1);c.lineTo(rx2,ry2);c.stroke();c.beginPath();c.moveTo(mx1,my1);c.lineTo(mx2,my2);c.stroke();}}c.globalAlpha=1;c.shadowBlur=0;c.setLineDash([]);}

function getPos(e){const r=canvas.getBoundingClientRect();const scaleX=canvas.width/r.width,scaleY=canvas.height/r.height;const src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*scaleX,y:(src.clientY-r.top)*scaleY};}
const STAMP=new Set(['star','flower']);
let lastStamp=null;

function doDraw(x,y,px,py){if(STAMP.has(S.brushType)){const gap=Math.max(S.brushSize*1.2,8);if(!lastStamp){stampSym(ctx,x,y,S.sym,S.brushType,S.brushSize,S.color,S.glow);lastStamp={x,y};}else{const dx=x-lastStamp.x,dy=y-lastStamp.y,d=Math.hypot(dx,dy);if(d>=gap){const steps=Math.floor(d/gap);for(let i=1;i<=steps;i++){const t=i/steps;stampSym(ctx,lastStamp.x+dx*t,lastStamp.y+dy*t,S.sym,S.brushType,S.brushSize,S.color,S.glow);}lastStamp={x,y};}}}else{drawSymLine(ctx,px??x,py??y,x,y,S.sym,S.brushType,S.brushSize,S.color,S.glow);}}

function onStart(e){e.preventDefault();S.drawing=true;wrap.classList.add('drawing');S.snap=ctx.getImageData(0,0,canvas.width,canvas.height);const{x,y}=getPos(e);S.lastX=x;S.lastY=y;lastStamp=null;S.currentStroke={color:S.color,size:S.brushSize,brushType:S.brushType,glow:S.glow,sym:S.sym,points:[{x,y}]};doDraw(x,y,x,y);}
function onMove(e){e.preventDefault();if(!S.drawing)return;const{x,y}=getPos(e);doDraw(x,y,S.lastX,S.lastY);if(S.currentStroke)S.currentStroke.points.push({x,y});S.lastX=x;S.lastY=y;}
function onEnd(){if(!S.drawing)return;S.drawing=false;wrap.classList.remove('drawing');if(S.snap){S.history.push(S.snap);if(S.history.length>25)S.history.shift();S.snap=null;}if(S.currentStroke&&S.currentStroke.points.length>1){S.strokes.push(S.currentStroke);if(S.strokes.length>500)S.strokes.shift();}S.currentStroke=null;}

canvas.addEventListener('pointerdown',onStart,{passive:false});
canvas.addEventListener('pointermove',onMove,{passive:false});
canvas.addEventListener('pointerup',onEnd);
canvas.addEventListener('pointercancel',onEnd);
canvas.addEventListener('touchstart',onStart,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onEnd);

let replayRaf=null,replayRunning=false;
function startReplay(){if(!S.strokes.length){alert(T[lang].noStroke);return;}if(replayRunning)return;replayRunning=true;document.getElementById('replay-hud').classList.add('show');ctx.clearRect(0,0,canvas.width,canvas.height);const totalPts=S.strokes.reduce((a,s)=>a+Math.max(s.points.length-1,0),0);let drawn=0,si=0,pi=0,rls=null;const bar=document.getElementById('replay-bar');function step(){if(!replayRunning||si>=S.strokes.length){finishReplay();return;}const SPEED=Math.max(1,Math.floor(totalPts/400));for(let k=0;k<SPEED;k++){if(si>=S.strokes.length)break;const stroke=S.strokes[si];if(pi>=stroke.points.length-1){si++;pi=0;rls=null;continue;}const p1=stroke.points[pi],p2=stroke.points[pi+1];if(STAMP.has(stroke.brushType)){const gap=stroke.size*2.2;if(!rls||Math.hypot(p2.x-rls.x,p2.y-rls.y)>=gap){stampSym(ctx,p2.x,p2.y,stroke.sym,stroke.brushType,stroke.size,stroke.color,stroke.glow);rls={x:p2.x,y:p2.y};}}else{drawSymLine(ctx,p1.x,p1.y,p2.x,p2.y,stroke.sym,stroke.brushType,stroke.size,stroke.color,stroke.glow);}pi++;drawn++;}bar.style.width=(totalPts>0?Math.min(100,Math.round(drawn/totalPts*100)):100)+'%';replayRaf=requestAnimationFrame(step);}replayRaf=requestAnimationFrame(step);}
function finishReplay(){replayRunning=false;if(replayRaf){cancelAnimationFrame(replayRaf);replayRaf=null;}document.getElementById('replay-hud').classList.remove('show');document.getElementById('replay-bar').style.width='0%';}
function stopReplay(){replayRunning=false;if(S.history.length)ctx.putImageData(S.history[S.history.length-1],0,0);finishReplay();}
document.getElementById('replay-btn').addEventListener('click',()=>{if(replayRunning)stopReplay();else startReplay();});
document.getElementById('replay-stop').addEventListener('click',stopReplay);

document.querySelectorAll('[data-sym]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('[data-sym]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');S.sym=parseInt(btn.dataset.sym);badge.textContent=T[lang].sym[S.sym]||S.sym;drawGuides();});});
document.querySelectorAll('[data-brush]').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('[data-brush]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');S.brushType=btn.dataset.brush;});});
document.querySelectorAll('[data-color]').forEach(d=>{d.addEventListener('click',()=>{document.querySelectorAll('[data-color]').forEach(x=>x.classList.remove('active'));d.classList.add('active');S.color=d.dataset.color;drawGuides();});});
document.getElementById('custom-color').addEventListener('input',e=>{document.querySelectorAll('[data-color]').forEach(x=>x.classList.remove('active'));S.color=e.target.value;});
document.querySelectorAll('[data-bg]').forEach(s=>{s.addEventListener('click',()=>{document.querySelectorAll('[data-bg]').forEach(x=>x.classList.remove('active'));s.classList.add('active');S.bgKey=s.dataset.bg;wrap.style.background=BG[S.bgKey].css;});});
document.getElementById('custom-bg').addEventListener('input',e=>{document.querySelectorAll('[data-bg]').forEach(x=>x.classList.remove('active'));const hex=e.target.value;BG['custom']={css:hex,fill:hex};S.bgKey='custom';wrap.style.background=hex;});
document.getElementById('brush-size').addEventListener('input',e=>{S.brushSize=parseInt(e.target.value);});
const glowBtn=document.getElementById('glow-btn');
glowBtn.addEventListener('click',()=>{S.glow=!S.glow;glowBtn.classList.toggle('active',S.glow);});

document.getElementById('undo-btn').addEventListener('click',()=>{if(S.history.length){const prev=S.history.pop();ctx.clearRect(0,0,canvas.width,canvas.height);ctx.putImageData(prev,0,0);if(S.strokes.length)S.strokes.pop();}else{ctx.clearRect(0,0,canvas.width,canvas.height);}});
document.getElementById('clear-btn').addEventListener('click',()=>{document.getElementById('confirm-modal').classList.add('open');});
document.getElementById('confirm-no').addEventListener('click',()=>{document.getElementById('confirm-modal').classList.remove('open');});
document.getElementById('confirm-yes').addEventListener('click',()=>{document.getElementById('confirm-modal').classList.remove('open');ctx.clearRect(0,0,canvas.width,canvas.height);S.history=[];S.strokes=[];});

function saveGallery(){try{localStorage.setItem('kkotpium-v3',JSON.stringify(S.gallery));}catch(e){}}
function makeDataUrl(){const tmp=document.createElement('canvas');tmp.width=canvas.width;tmp.height=canvas.height;const tc=tmp.getContext('2d');const bg=BG[S.bgKey];if(bg.css.startsWith('linear')){const grd=tc.createLinearGradient(0,0,tmp.width,tmp.height);const c1=bg.fill,c2=bg.css.match(/#[0-9a-f]{6}/gi)?.[1]||c1;grd.addColorStop(0,c1);grd.addColorStop(1,c2);tc.fillStyle=grd;}else{tc.fillStyle=bg.fill;}tc.fillRect(0,0,tmp.width,tmp.height);tc.drawImage(canvas,0,0);return tmp.toDataURL('image/png');}
document.getElementById('save-btn').addEventListener('click',()=>{document.getElementById('save-modal').classList.add('open');});
document.getElementById('save-cancel').addEventListener('click',()=>{document.getElementById('save-modal').classList.remove('open');});
document.getElementById('save-confirm').addEventListener('click',async()=>{document.getElementById('save-modal').classList.remove('open');const url=makeDataUrl();S.gallery.unshift(url);if(S.gallery.length>24)S.gallery.pop();saveGallery();const filename=`꽃피움_${new Date().toISOString().slice(0,10)}.png`;if(navigator.share&&navigator.canShare){try{const res=await fetch(url);const blob=await res.blob();const file=new File([blob],filename,{type:'image/png'});if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'꽃피움'});return;}}catch(e){if(e.name==='AbortError')return;}}const a=document.createElement('a');a.download=filename;a.href=url;a.click();});
document.getElementById('save-modal').addEventListener('click',e=>{if(e.target===document.getElementById('save-modal'))document.getElementById('save-modal').classList.remove('open');});

function renderGallery(){const grid=document.getElementById('gallery-grid');if(!S.gallery.length){grid.innerHTML=`<div class="g-empty">${T[lang].galleryEmpty}</div>`;return;}grid.innerHTML=S.gallery.map((url,i)=>`<div class="g-item"><img src="${url}" alt="${i+1}"><button class="g-del" data-i="${i}">✕</button></div>`).join('');grid.querySelectorAll('img').forEach(img=>{img.addEventListener('click',()=>{const a=document.createElement('a');a.download=`꽃피움_${Date.now()}.png`;a.href=img.src;a.click();});});grid.querySelectorAll('.g-del').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();S.gallery.splice(+btn.dataset.i,1);saveGallery();renderGallery();});});}
document.getElementById('gallery-btn').addEventListener('click',()=>{renderGallery();document.getElementById('gallery-modal').classList.add('open');});
document.getElementById('gallery-close').addEventListener('click',()=>{document.getElementById('gallery-modal').classList.remove('open');});
document.getElementById('gallery-modal').addEventListener('click',e=>{if(e.target===document.getElementById('gallery-modal'))document.getElementById('gallery-modal').classList.remove('open');});

if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}
window.addEventListener('resize',resize);
wrap.style.background=BG[S.bgKey].css;
applyLang();
requestAnimationFrame(()=>{resize();requestAnimationFrame(resize);});
</script>

<style>
:root {
  --bg:       #fff8f2;
  --surface:  rgba(255,255,255,0.85);
  --border:   #e8d8cc;
  --accent:   #c8709a;
  --accent2:  #6ab8a0;
  --gold:     #e8a030;
  --text:     #3a2a36;
  --muted:    #a08898;
  --shadow:   rgba(180,120,140,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Gowun Dodum', sans-serif;
  touch-action: none;
}

/* ── LAYOUT ── */
#app { display:flex; flex-direction:column; height:100%; }

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: rgba(255,252,250,0.96);
  border-bottom: 1.5px solid var(--border);
  box-shadow: 0 2px 10px var(--shadow);
  flex-shrink: 0;
  flex-wrap: wrap;
  z-index: 20;
}

.logo {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.04em;
  white-space: nowrap;
  line-height: 1.1;
  flex-shrink: 0;
}
.logo small {
  display: block;
  font-family: 'Gowun Dodum', sans-serif;
  font-weight: 400;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
}

.vline {
  width: 1px; height: 26px;
  background: var(--border);
  flex-shrink: 0;
}

/* ── PILL GROUP ── */
.ctrl { display:flex; align-items:center; gap:4px; }
.ctrl-lbl {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}

.pill {
  height: 26px; padding: 0 9px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #2a1040;
  font-weight: bold;
}
.pill:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

/* ── ICON BUTTON ── */
.icon-btn {
  width: 30px; height: 26px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  line-height: 1;
  padding: 0;
  transition: all 0.18s;
  position: relative;
}
.icon-btn.active { background: var(--accent2); border-color: var(--accent2); color: #0a2820; }
.icon-btn:hover:not(.active) { border-color: var(--accent2); color: var(--accent2); }

/* ── COLOR DOTS ── */
.dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.dot.active { border-color: white; transform: scale(1.25); }
.dot:hover:not(.active) { transform: scale(1.12); }

/* ── BG SWATCH ── */
.bg-swatch {
  width: 20px; height: 20px;
  border-radius: 5px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
  flex-shrink: 0;
}
.bg-swatch.active { border-color: white; transform: scale(1.2); }
.bg-swatch:hover:not(.active) { transform: scale(1.1); }

/* ── SLIDER ── */
input[type=range] {
  -webkit-appearance: none;
  width: 58px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

/* ── ACTION BUTTONS ── */
.act {
  height: 28px; padding: 0 11px;
  border-radius: 7px;
  border: 1px solid var(--border);
  background: transparent;
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 11px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.act:hover { border-color: var(--accent); color: var(--accent); }
.act.primary { background: var(--gold); border-color: var(--gold); color: #2a1a00; font-weight: bold; }
.act.primary:hover { filter: brightness(1.08); }
.act.danger:hover { border-color: #f08080; color: #f08080; }

/* ── TOOLTIP ── */
#tooltip {
  position: fixed;
  top: 52px;
  background: rgba(58,42,54,0.92);
  color: #fff;
  font-size: 10px;
  font-family: 'Gowun Dodum', sans-serif;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 6px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 9999;
  transform: translateX(-50%);
}

/* ── CANVAS AREA ── */
#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #fff4f8 0%, #f0f8ff 50%, #f8fff4 100%);
  transition: background 0.5s;
}
#canvas, #guide-canvas {
  position: absolute; top:0; left:0;
  width: 100%; height: 100%;
  display: block;
}
#canvas { cursor: crosshair; touch-action: none; z-index: 2; }
#guide-canvas { pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 3; }
#canvas-wrap:hover #guide-canvas,
#canvas-wrap.drawing #guide-canvas { opacity: 0.5; }

/* ── SYM BADGE ── */
#sym-badge {
  position: absolute;
  top: 10px; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,252,250,0.88);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 3px 14px;
  font-family: 'Nanum Myeongjo', serif;
  font-size: 12px;
  color: var(--accent);
  pointer-events: none;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 8px var(--shadow);
  z-index: 5;
  letter-spacing: 0.06em;
}

/* ── REPLAY HUD (구석 작은 표시) ── */
#replay-hud {
  display: none;
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  background: rgba(255,252,250,0.92);
  border: 1.5px solid var(--border);
  border-radius: 30px;
  padding: 7px 16px;
  z-index: 10;
  align-items: center;
  gap: 10px;
  backdrop-filter: blur(6px);
  box-shadow: 0 2px 12px var(--shadow);
  white-space: nowrap;
}
#replay-hud.show { display: flex; }
.hud-msg {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.05em;
}
.hud-bar-wrap {
  width: 100px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.hud-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.06s linear;
}
.hud-stop {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.hud-stop:hover { border-color: var(--accent); color: var(--accent); }

/* ── AD BANNER ── */
#ad-banner {
  flex-shrink: 0;
  background: white;
  border-top: 1.5px solid var(--border);
  min-height: 56px;
  display: flex; align-items: center; justify-content: center;
}
.ad-placeholder {
  width: 100%; max-width: 728px; height: 50px;
  display: flex; align-items: center; justify-content: center;
  border: 1px dashed var(--border);
  border-radius: 4px;
  font-size: 10px;
  color: var(--muted);
  font-family: 'Gowun Dodum', sans-serif;
  letter-spacing: 0.08em;
}

/* ── MODALS ── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(180,140,160,0.35);
  backdrop-filter: blur(10px);
  z-index: 100;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }

@keyframes popIn {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}

/* Save modal */
.save-box {
  background: #fff8f4;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px 20px;
  width: min(380px, 93vw);
  text-align: center;
  box-shadow: 0 20px 60px var(--shadow);
  animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 20px;
  color: var(--accent);
  margin-bottom: 5px;
  letter-spacing: 0.04em;
}
.modal-sub { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
#modal-ad {
  width: 100%; min-height: 90px;
  background: #f5eef0;
  border: 1px dashed var(--border);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--muted);
  margin-bottom: 16px;
  font-family: 'Gowun Dodum', sans-serif;
}
.modal-btns { display:flex; gap:8px; }
.modal-btn {
  flex: 1; height: 42px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: white;
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.15s;
}
.modal-btn.go { background: var(--accent); border-color: var(--accent); color: white; font-weight: bold; }
.modal-btn:hover { filter: brightness(0.96); }

/* Gallery modal */
.gallery-box {
  background: #fff8f4;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  width: min(580px, 95vw);
  max-height: 82vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px var(--shadow);
  animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
.gallery-hd {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.gallery-hd span {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 17px; color: var(--accent);
}
.gallery-hd button {
  background: none; border: none;
  color: var(--muted); font-size: 18px; cursor: pointer;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
}
.g-item {
  border-radius: 10px;
  overflow: hidden;
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  aspect-ratio: 1;
  background: var(--bg);
}
.g-item:hover { border-color: var(--accent); transform: scale(1.03); }
.g-item img { width:100%; height:100%; object-fit:cover; display:block; }
.g-del {
  position: absolute; top: 4px; right: 4px;
  width: 20px; height: 20px;
  background: rgba(255,255,255,0.92);
  border: none; border-radius: 50%;
  color: #c04060; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  opacity: 0; transition: opacity 0.15s;
}
.g-item:hover .g-del { opacity: 1; }
.g-empty { text-align:center; color: var(--muted); font-size:13px; padding:48px 0; line-height:2; }

/* Confirm modal */
.confirm-box {
  background: #fff8f4;
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  width: min(300px, 90vw);
  text-align: center;
  box-shadow: 0 10px 40px var(--shadow);
  animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
}
.confirm-ico { font-size: 34px; margin-bottom: 10px; }
.confirm-ttl { font-size: 15px; color: var(--text); margin-bottom: 5px; font-weight: bold; }
.confirm-sub { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
.confirm-row { display:flex; gap:8px; }
.c-btn {
  flex:1; height:40px; border-radius:10px;
  border: 1.5px solid var(--border);
  background: white;
  font-family: 'Gowun Dodum', sans-serif;
  font-size: 13px; cursor: pointer;
  color: var(--text); transition: all 0.15s;
}
.c-btn.red { background: #fff0f0; border-color: #f0c0c0; color: #c04060; }
.c-btn.red:hover { background: #c04060; border-color: #c04060; color: white; }
.c-btn:hover:not(.red) { border-color: var(--accent); }

/* Responsive */
@media (max-width: 640px) {
  .logo small { display: none; }
  .pill { font-size: 11px; padding: 0 6px; height: 22px; }
  .vline { display: none !important; }
  header {
    flex-wrap: wrap;
    gap: 6px;
    padding: 7px 10px;
  }
  /* 1행: 로고 + 대칭 + 액션버튼 */
  .logo { order: 0; }
  .ctrl-sym { order: 1; flex: 1; }
  .ctrl-actions { order: 2; }
  /* 2행: 브러시 + 색상 + 배경 + 굵기 — 전체 너비 */
  .ctrl-row2 {
    order: 3;
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    padding-top: 4px;
    border-top: 1px solid var(--border);
  }
  .hs { display: flex !important; }
  .act { font-size: 11px; padding: 0 8px; height: 26px; }
  .icon-btn { width: 26px; height: 24px; font-size: 13px; }
  .dot { width: 16px !important; height: 16px !important; }
  .bg-swatch { width: 18px !important; height: 18px !important; }
  #brush-size { width: 70px; }
}
</style>
</head>
<body>
<div id="app">

<!-- ══ HEADER ══ -->
<header>
  <!-- 로고 -->
  <div class="logo">꽃피움<small>Kkotpium · 대칭 드로잉</small></div>
  <div class="vline"></div>

  <!-- 1행: 대칭축 -->
  <div class="ctrl ctrl-sym">
    <span class="ctrl-lbl hs">대칭</span>
    <button class="pill active" data-sym="2" data-tip="2축 대칭">2</button>
    <button class="pill" data-sym="4" data-tip="4축 대칭">4</button>
    <button class="pill" data-sym="6" data-tip="6축 대칭">6</button>
    <button class="pill" data-sym="8" data-tip="8축 대칭">8</button>
    <button class="pill" data-sym="12" data-tip="12축 대칭">12</button>
    <button class="pill" data-sym="16" data-tip="만다라 모드 🌸">만다라</button>
  </div>

  <div style="flex:1 1 auto"></div>

  <!-- 1행: 액션 버튼 -->
  <div class="ctrl ctrl-actions" style="gap:5px">
    <button class="act" id="replay-btn" data-tip="그리는 과정 재생">▶ 재생</button>
    <button class="act" id="gallery-btn" data-tip="내 작품 보관함">🖼</button>
    <button class="act" id="undo-btn" data-tip="한 단계 되돌리기">↩</button>
    <button class="act primary" id="save-btn" data-tip="작품 저장">💾 저장</button>
    <button class="act danger" id="clear-btn" data-tip="캔버스 전체 지우기" style="padding:0 9px;font-size:15px;">🗑️</button>
  </div>

  <!-- 2행: 브러시 + 색상 + 배경 + 굵기 + 효과 -->
  <div class="ctrl-row2">
    <!-- 브러시 -->
    <div class="ctrl">
      <span class="ctrl-lbl">브러시</span>
      <button class="icon-btn active" data-brush="normal" data-tip="기본 선">✏️</button>
      <button class="icon-btn" data-brush="dotted" data-tip="점선">· · ·</button>
      <button class="icon-btn" data-brush="star" data-tip="별 스탬프">★</button>
      <button class="icon-btn" data-brush="flower" data-tip="꽃 스탬프">✿</button>
      <button class="icon-btn" data-brush="wave" data-tip="물결선">〜</button>
    </div>
    <div class="vline hs"></div>

    <!-- 색상 -->
    <div class="ctrl">
      <span class="ctrl-lbl hs">색</span>
      <div class="dot active" style="background:#c8709a" data-color="#c8709a" data-tip="딥 로즈"></div>
      <div class="dot" style="background:#70a8c8" data-color="#70a8c8" data-tip="코발트 블루"></div>
      <div class="dot" style="background:#70b890" data-color="#70b890" data-tip="세이지 그린"></div>
      <div class="dot" style="background:#c89040" data-color="#c89040" data-tip="앰버 골드"></div>
      <div class="dot" style="background:#a070c8" data-color="#a070c8" data-tip="바이올렛"></div>
      <div class="dot" style="background:#3a2a36" data-color="#3a2a36" data-tip="다크 잉크"></div>
      <input type="color" id="custom-color" value="#c8709a"
        style="width:20px;height:20px;border-radius:50%;border:2px solid var(--border);cursor:pointer;padding:0;background:none;flex-shrink:0"
        data-tip="직접 선택">
    </div>
    <div class="vline hs"></div>

    <!-- 배경 -->
    <div class="ctrl">
      <span class="ctrl-lbl">배경</span>
      <div class="bg-swatch active" data-bg="petal" data-tip="로즈 페탈"
        style="background:linear-gradient(135deg,#fff4f8,#ffeef8)"></div>
      <div class="bg-swatch" data-bg="sky" data-tip="스카이 블루"
        style="background:linear-gradient(135deg,#f0f8ff,#e8f4ff)"></div>
      <div class="bg-swatch" data-bg="meadow" data-tip="민트 메도우"
        style="background:linear-gradient(135deg,#f0fff4,#e8faf0)"></div>
      <div class="bg-swatch" data-bg="sunrise" data-tip="선라이즈"
        style="background:linear-gradient(135deg,#fff8f0,#ffeedd)"></div>
      <div class="bg-swatch" data-bg="lavender" data-tip="라벤더"
        style="background:linear-gradient(135deg,#f8f0ff,#f0e8ff)"></div>
      <div class="bg-swatch" data-bg="cream" data-tip="크림"
        style="background:#fffdf8;box-shadow:inset 0 0 0 1px #e0d8c8"></div>
      <input type="color" id="custom-bg" value="#fff4f8"
        style="width:20px;height:20px;border-radius:5px;border:2px solid var(--border);cursor:pointer;padding:0;background:none;flex-shrink:0"
        data-tip="배경색 직접 선택">
    </div>
    <div class="vline hs"></div>

    <!-- 굵기 -->
    <div class="ctrl">
      <span class="ctrl-lbl">굵기</span>
      <input type="range" id="brush-size" min="1" max="28" value="4" data-tip="브러시 굵기">
    </div>

    <!-- 효과 -->
    <button class="icon-btn" id="glow-btn" data-tip="빛나기 효과">✨</button>
  </div>
</header>

<!-- ══ CANVAS ══ -->
<div id="canvas-wrap">

<script>
// ══════════════════════════════════════════════════════
//  BACKGROUND CONFIGS
// ══════════════════════════════════════════════════════
const BACKGROUNDS = {
  petal:    { css: 'linear-gradient(135deg,#fff4f8 0%,#ffeef8 100%)', fill: '#fff4f8' },
  sky:      { css: 'linear-gradient(135deg,#f0f8ff 0%,#e8f4ff 100%)', fill: '#f0f8ff' },
  meadow:   { css: 'linear-gradient(135deg,#f0fff4 0%,#e8faf0 100%)', fill: '#f0fff4' },
  sunrise:  { css: 'linear-gradient(135deg,#fff8f0 0%,#ffeedd 100%)', fill: '#fff8f0' },
  lavender: { css: 'linear-gradient(135deg,#f8f0ff 0%,#f0e8ff 100%)', fill: '#f8f0ff' },
  cream:    { css: '#fffdf8', fill: '#fffdf8' },
};

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
const S = {
  sym: 2,
  color: '#c8709a',
  brushSize: 4,
  brushType: 'normal',
  bgKey: 'petal',
  glow: false,
  drawing: false,
  lastX: null, lastY: null,
  history: [],
  snap: null,
  strokes: [],
  currentStroke: null,
  gallery: [],
};

// Load gallery
try { S.gallery = JSON.parse(localStorage.getItem('kkotpium-v3') || '[]'); } catch(e) {}

// ══════════════════════════════════════════════════════
//  CANVAS SETUP
// ══════════════════════════════════════════════════════
const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const guide  = document.getElementById('guide-canvas');
const gctx   = guide.getContext('2d');
const badge  = document.getElementById('sym-badge');

const SYM_LABELS = {2:'2축 대칭',4:'4축 대칭',6:'6축 대칭',8:'8축 대칭',12:'12축 대칭',16:'만다라 🌸'};

function resize() {
  const w = wrap.offsetWidth, h = wrap.offsetHeight;
  if (!w || !h) return;
  let img = null;
  if (canvas.width && canvas.height) {
    try { img = ctx.getImageData(0, 0, canvas.width, canvas.height); } catch(e) {}
  }
  // canvas 해상도 = 실제 픽셀 크기 (CSS는 100%로 맞춰짐)
  canvas.width = guide.width = w;
  canvas.height = guide.height = h;
  if (img) ctx.putImageData(img, 0, 0);
  drawGuides();
}

function drawGuides() {
  const w = guide.width, h = guide.height;
  const cx = w/2, cy = h/2;
  gctx.clearRect(0, 0, w, h);
  gctx.strokeStyle = S.color;
  gctx.lineWidth = 0.6;
  gctx.setLineDash([4, 8]);
  for (let i = 0; i < S.sym; i++) {
    const a = (Math.PI * 2 * i) / S.sym;
    const len = Math.hypot(w, h);
    gctx.beginPath();
    gctx.moveTo(cx, cy);
    gctx.lineTo(cx + Math.cos(a) * len, cy + Math.sin(a) * len);
    gctx.stroke();
  }
  gctx.setLineDash([]);
}

// ══════════════════════════════════════════════════════
//  DRAW SYMMETRIC LINE
// ══════════════════════════════════════════════════════
// ── 별 모양 ──
function drawStar(c, cx, cy, r, color, alpha, glow) {
  c.save();
  c.globalAlpha = alpha;
  c.fillStyle = color;
  c.shadowBlur = glow ? r * 2 : 0;
  c.shadowColor = color;
  c.beginPath();
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI / 5) * i - Math.PI / 2;
    const radius = i % 2 === 0 ? r : r * 0.42;
    const px = cx + Math.cos(angle) * radius;
    const py = cy + Math.sin(angle) * radius;
    i === 0 ? c.moveTo(px, py) : c.lineTo(px, py);
  }
  c.closePath();
  c.fill();
  c.restore();
}

// ── 꽃 모양 ──
function drawFlower(c, cx, cy, r, color, alpha, glow) {
  c.save();
  c.globalAlpha = alpha;
  c.fillStyle = color;
  c.shadowBlur = glow ? r * 2 : 0;
  c.shadowColor = color;
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 / 6) * i;
    const px = cx + Math.cos(angle) * r * 0.52;
    const py = cy + Math.sin(angle) * r * 0.52;
    c.beginPath();
    c.ellipse(px, py, r * 0.4, r * 0.22, angle, 0, Math.PI * 2);
    c.fill();
  }
  // 중심 원
  c.beginPath();
  c.arc(cx, cy, r * 0.2, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

// ── 스탬프 대칭 찍기 ──
function stampSym(c, x, y, sym, brushType, size, color, glow) {
  const cw = c.canvas.width, ch = c.canvas.height;
  const cx = cw / 2, cy = ch / 2;
  const dx = x - cx, dy = y - cy;
  const r = size * 1.5;
  const alpha = 0.88;

  for (let i = 0; i < sym; i++) {
    const a = (Math.PI * 2 * i) / sym;
    const cos = Math.cos(a), sin = Math.sin(a);
    const rx = cx + dx*cos - dy*sin, ry = cy + dx*sin + dy*cos;
    const mx = cx + dx*cos + dy*sin, my = cy + dx*sin - dy*cos;

    if (brushType === 'star') {
      drawStar(c, rx, ry, r, color, alpha, glow);
      drawStar(c, mx, my, r, color, alpha, glow);
    } else {
      drawFlower(c, rx, ry, r, color, alpha, glow);
      drawFlower(c, mx, my, r, color, alpha, glow);
    }
  }
}

// ── 물결 세그먼트 ──
let waveT = 0;
function drawWaveSegment(c, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  if (len < 0.5) return;
  const nx = -dy / len, ny = dx / len;
  const amp = c.lineWidth * 2;
  waveT += 0.3;
  const steps = Math.max(3, Math.ceil(len / 2));
  c.beginPath();
  for (let s = 0; s <= steps; s++) {
    const t = s / steps;
    const wave = Math.sin(t * Math.PI * 4 + waveT) * amp;
    const px = x1 + dx*t + nx*wave;
    const py = y1 + dy*t + ny*wave;
    s === 0 ? c.moveTo(px, py) : c.lineTo(px, py);
  }
  c.stroke();
}

// ── 선 대칭 그리기 (normal / dotted / wave) ──
function drawSymLine(c, x1, y1, x2, y2, sym, brushType, size, color, glow) {
  const cw = c.canvas.width, ch = c.canvas.height;
  const cx = cw/2, cy = ch/2;
  const dx1=x1-cx, dy1=y1-cy, dx2=x2-cx, dy2=y2-cy;

  c.lineCap = 'round';
  c.lineJoin = 'round';
  c.strokeStyle = color;
  c.setLineDash([]);
  c.shadowBlur = 0;

  if (brushType === 'dotted') {
    c.setLineDash([2, size * 2.2]);
    c.lineWidth = size * 0.8;
    c.globalAlpha = 0.95;
  } else {
    c.lineWidth = size;
    c.globalAlpha = 0.88;
  }
  if (glow) { c.shadowBlur = size * 3.5; c.shadowColor = color; }

  for (let i = 0; i < sym; i++) {
    const a = (Math.PI * 2 * i) / sym;
    const cos = Math.cos(a), sin = Math.sin(a);
    const rx1=cx+dx1*cos-dy1*sin, ry1=cy+dx1*sin+dy1*cos;
    const rx2=cx+dx2*cos-dy2*sin, ry2=cy+dx2*sin+dy2*cos;
    const mx1=cx+dx1*cos+dy1*sin, my1=cy+dx1*sin-dy1*cos;
    const mx2=cx+dx2*cos+dy2*sin, my2=cy+dx2*sin-dy2*cos;

    if (brushType === 'wave') {
      drawWaveSegment(c, rx1, ry1, rx2, ry2);
      drawWaveSegment(c, mx1, my1, mx2, my2);
    } else {
      c.beginPath(); c.moveTo(rx1,ry1); c.lineTo(rx2,ry2); c.stroke();
      c.beginPath(); c.moveTo(mx1,my1); c.lineTo(mx2,my2); c.stroke();
    }
  }
  c.globalAlpha = 1;
  c.shadowBlur = 0;
  c.setLineDash([]);
}

// ══════════════════════════════════════════════════════
//  POINTER EVENTS
// ══════════════════════════════════════════════════════
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  // canvas 내부 해상도와 CSS 표시 크기 비율 보정
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  if (e.touches) return {
    x: (e.touches[0].clientX - r.left) * scaleX,
    y: (e.touches[0].clientY - r.top) * scaleY
  };
  return {
    x: (e.clientX - r.left) * scaleX,
    y: (e.clientY - r.top) * scaleY
  };
}

const STAMP_BRUSHES = new Set(['star', 'flower']);
let lastStampPos = null;

function isStamp() { return STAMP_BRUSHES.has(S.brushType); }

function doDraw(x, y, px, py) {
  if (isStamp()) {
    const gap = Math.max(S.brushSize * 1.2, 8);
    const fromX = px ?? x, fromY = py ?? y;
    const dist = Math.hypot(x - fromX, y - fromY);

    if (!lastStampPos) {
      // 첫 점
      stampSym(ctx, x, y, S.sym, S.brushType, S.brushSize, S.color, S.glow);
      lastStampPos = {x, y};
    } else {
      // 이전 스탬프 위치부터 현재까지 보간해서 균일하게 채움
      const dx = x - lastStampPos.x, dy = y - lastStampPos.y;
      const d = Math.hypot(dx, dy);
      if (d >= gap) {
        const steps = Math.floor(d / gap);
        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          const ix = lastStampPos.x + dx * t;
          const iy = lastStampPos.y + dy * t;
          stampSym(ctx, ix, iy, S.sym, S.brushType, S.brushSize, S.color, S.glow);
        }
        lastStampPos = {x, y};
      }
    }
  } else {
    drawSymLine(ctx, px??x, py??y, x, y, S.sym, S.brushType, S.brushSize, S.color, S.glow);
  }
}

function onStart(e) {
  e.preventDefault();
  S.drawing = true;
  wrap.classList.add('drawing');
  S.snap = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const {x, y} = getPos(e);
  S.lastX = x; S.lastY = y;
  lastStampPos = null;
  S.currentStroke = {
    color: S.color, size: S.brushSize,
    brushType: S.brushType, glow: S.glow,
    sym: S.sym,
    points: [{x, y}]
  };
  doDraw(x, y, x, y);
}

function onMove(e) {
  e.preventDefault();
  if (!S.drawing) return;
  const {x, y} = getPos(e);
  doDraw(x, y, S.lastX, S.lastY);
  if (S.currentStroke) S.currentStroke.points.push({x, y});
  S.lastX = x; S.lastY = y;
}

function onEnd() {
  if (!S.drawing) return;
  S.drawing = false;
  wrap.classList.remove('drawing');
  if (S.snap) { S.history.push(S.snap); if (S.history.length > 25) S.history.shift(); S.snap = null; }
  if (S.currentStroke && S.currentStroke.points.length > 1) {
    S.strokes.push(S.currentStroke);
    if (S.strokes.length > 500) S.strokes.shift();
  }
  S.currentStroke = null;
}

canvas.addEventListener('pointerdown', onStart);
canvas.addEventListener('pointermove', onMove);
canvas.addEventListener('pointerup', onEnd);
canvas.addEventListener('pointerleave', onEnd);
canvas.addEventListener('touchstart', onStart, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onEnd);

// ══════════════════════════════════════════════════════
//  ANIMATION REPLAY — 구석 HUD, 블러 없음
// ══════════════════════════════════════════════════════
let replayRaf = null;
let replayRunning = false;

function startReplay() {
  if (!S.strokes.length) { alert('먼저 그림을 그려보세요! 🌸'); return; }
  if (replayRunning) return;
  replayRunning = true;

  const hud = document.getElementById('replay-hud');
  const bar = document.getElementById('replay-bar');
  hud.classList.add('show');

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const totalPts = S.strokes.reduce((a, s) => a + Math.max(s.points.length - 1, 0), 0);
  let drawn = 0, si = 0, pi = 0;
  let replayLastStamp = null;

  function step() {
    if (!replayRunning) { finishReplay(); return; }
    if (si >= S.strokes.length) { finishReplay(); return; }

    const SPEED = Math.max(1, Math.floor(totalPts / 400));
    for (let k = 0; k < SPEED; k++) {
      if (si >= S.strokes.length) break;
      const stroke = S.strokes[si];
      if (pi >= stroke.points.length - 1) { si++; pi = 0; replayLastStamp = null; continue; }

      const p1 = stroke.points[pi], p2 = stroke.points[pi+1];
      const isStampBrush = STAMP_BRUSHES.has(stroke.brushType);

      if (isStampBrush) {
        const gap = stroke.size * 2.2;
        if (!replayLastStamp || Math.hypot(p2.x - replayLastStamp.x, p2.y - replayLastStamp.y) >= gap) {
          stampSym(ctx, p2.x, p2.y, stroke.sym, stroke.brushType, stroke.size, stroke.color, stroke.glow);
          replayLastStamp = {x: p2.x, y: p2.y};
        }
      } else {
        drawSymLine(ctx, p1.x, p1.y, p2.x, p2.y,
          stroke.sym, stroke.brushType, stroke.size, stroke.color, stroke.glow);
      }
      pi++; drawn++;
    }

    bar.style.width = (totalPts > 0 ? Math.min(100, Math.round(drawn/totalPts*100)) : 100) + '%';
    replayRaf = requestAnimationFrame(step);
  }

  replayRaf = requestAnimationFrame(step);
}

function finishReplay() {
  replayRunning = false;
  if (replayRaf) { cancelAnimationFrame(replayRaf); replayRaf = null; }
  document.getElementById('replay-hud').classList.remove('show');
  document.getElementById('replay-bar').style.width = '0%';
}

function stopReplay() {
  replayRunning = false;
  if (S.history.length) ctx.putImageData(S.history[S.history.length-1], 0, 0);
  finishReplay();
}

document.getElementById('replay-btn').addEventListener('click', () => {
  if (replayRunning) stopReplay(); else startReplay();
});
document.getElementById('replay-stop').addEventListener('click', stopReplay);

// ══════════════════════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════════════════════

// Symmetry
document.querySelectorAll('[data-sym]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-sym]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.sym = parseInt(btn.dataset.sym);
    badge.textContent = SYM_LABELS[S.sym] || `${S.sym}축 대칭`;
    drawGuides();
  });
});

// Brush type
document.querySelectorAll('[data-brush]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-brush]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.brushType = btn.dataset.brush;
  });
});

// Color dots
document.querySelectorAll('.dot').forEach(d => {
  d.addEventListener('click', () => {
    document.querySelectorAll('.dot').forEach(x => x.classList.remove('active'));
    d.classList.add('active');
    S.color = d.dataset.color;
    drawGuides();
  });
});
document.getElementById('custom-color').addEventListener('input', e => {
  document.querySelectorAll('.dot').forEach(x => x.classList.remove('active'));
  S.color = e.target.value;
});

// Background presets
document.querySelectorAll('.bg-swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('.bg-swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    S.bgKey = s.dataset.bg;
    wrap.style.background = BACKGROUNDS[S.bgKey].css;
  });
});

// Custom bg color picker
document.getElementById('custom-bg').addEventListener('input', e => {
  document.querySelectorAll('.bg-swatch').forEach(x => x.classList.remove('active'));
  const hex = e.target.value;
  BACKGROUNDS['custom'] = { css: hex, fill: hex };
  S.bgKey = 'custom';
  wrap.style.background = hex;
});

// Brush size
document.getElementById('brush-size').addEventListener('input', e => {
  S.brushSize = parseInt(e.target.value);
});

// Glow
const glowBtn = document.getElementById('glow-btn');
glowBtn.addEventListener('click', () => {
  S.glow = !S.glow;
  glowBtn.classList.toggle('active', S.glow);
});

// Undo
document.getElementById('undo-btn').addEventListener('click', () => {
  if (S.history.length) { ctx.putImageData(S.history.pop(), 0, 0); S.strokes.pop(); }
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
});

// Clear with confirm
document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.add('open');
});
document.getElementById('confirm-no').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('open');
});
document.getElementById('confirm-yes').addEventListener('click', () => {
  document.getElementById('confirm-modal').classList.remove('open');
  S.history.push(ctx.getImageData(0,0,canvas.width,canvas.height));
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  S.strokes = [];
});

// ══════════════════════════════════════════════════════
//  SAVE + GALLERY
// ══════════════════════════════════════════════════════
function saveGallery() {
  try { localStorage.setItem('kkotpium-v3', JSON.stringify(S.gallery)); } catch(e) {}
}

function makeDataUrl() {
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  const tc = tmp.getContext('2d');
  const bg = BACKGROUNDS[S.bgKey];
  if (bg.css.startsWith('linear')) {
    const grd = tc.createLinearGradient(0, 0, tmp.width, tmp.height);
    const c1 = bg.fill, c2 = bg.css.match(/#[0-9a-f]{6}/gi)?.[1] || c1;
    grd.addColorStop(0, c1); grd.addColorStop(1, c2);
    tc.fillStyle = grd;
  } else {
    tc.fillStyle = bg.fill;
  }
  tc.fillRect(0, 0, tmp.width, tmp.height);
  tc.drawImage(canvas, 0, 0);
  return tmp.toDataURL('image/png');
}

document.getElementById('save-btn').addEventListener('click', () => {
  document.getElementById('save-modal').classList.add('open');
});
document.getElementById('save-cancel').addEventListener('click', () => {
  document.getElementById('save-modal').classList.remove('open');
});
document.getElementById('save-confirm').addEventListener('click', async () => {
  document.getElementById('save-modal').classList.remove('open');
  const url = makeDataUrl();
  S.gallery.unshift(url);
  if (S.gallery.length > 24) S.gallery.pop();
  saveGallery();

  const filename = `꽃피움_${new Date().toISOString().slice(0,10)}.png`;

  // 모바일: Web Share API로 사진첩 저장 시도
  if (navigator.share && navigator.canShare) {
    try {
      const res = await fetch(url);
      const blob = await res.blob();
      const file = new File([blob], filename, { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: '꽃피움 작품' });
        return;
      }
    } catch(e) {
      // 공유 취소 등은 무시하고 폴백
      if (e.name === 'AbortError') return;
    }
  }

  // PC / 폴백: 일반 다운로드
  const a = document.createElement('a');
  a.download = filename;
  a.href = url;
  a.click();
});
document.getElementById('save-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('save-modal'))
    document.getElementById('save-modal').classList.remove('open');
});

// Gallery render
function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  if (!S.gallery.length) {
    grid.innerHTML = '<div class="g-empty">🌸 아직 저장된 작품이 없어요<br>그림을 그리고 저장해보세요</div>';
    return;
  }
  grid.innerHTML = S.gallery.map((url, i) => `
    <div class="g-item">
      <img src="${url}" alt="작품 ${i+1}" data-i="${i}">
      <button class="g-del" data-i="${i}">✕</button>
    </div>
  `).join('');
  grid.querySelectorAll('img').forEach(img => {
    img.addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = `꽃피움_${Date.now()}.png`;
      a.href = img.src; a.click();
    });
  });
  grid.querySelectorAll('.g-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      S.gallery.splice(+btn.dataset.i, 1);
      saveGallery(); renderGallery();
    });
  });
}
document.getElementById('gallery-btn').addEventListener('click', () => {
  renderGallery();
  document.getElementById('gallery-modal').classList.add('open');
});
document.getElementById('gallery-close').addEventListener('click', () => {
  document.getElementById('gallery-modal').classList.remove('open');
});
document.getElementById('gallery-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('gallery-modal'))
    document.getElementById('gallery-modal').classList.remove('open');
});

// ══════════════════════════════════════════════════════
//  TOOLTIP — JS 기반, 모든 요소 동일 위치
// ══════════════════════════════════════════════════════
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('[data-tip]').forEach(el => {
  el.addEventListener('mouseenter', e => {
    const rect = el.getBoundingClientRect();
    tooltip.textContent = el.dataset.tip;
    tooltip.style.opacity = '1';
    // 가로 중앙 = 요소 중앙
    const left = rect.left + rect.width / 2;
    tooltip.style.left = left + 'px';
  });
  el.addEventListener('mouseleave', () => {
    tooltip.style.opacity = '0';
  });
});

// ══════════════════════════════════════════════════════
//  PWA INSTALL
// ══════════════════════════════════════════════════════
let deferredPrompt = null;
const pwaToast = document.getElementById('pwa-toast');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  setTimeout(() => {
    pwaToast.style.opacity = '1';
    pwaToast.style.transform = 'translateX(-50%) translateY(0)';
    pwaToast.style.pointerEvents = 'all';
  }, 4000);
});
document.getElementById('pwa-install-btn').addEventListener('click', async () => {
  pwaToast.style.opacity = '0'; pwaToast.style.pointerEvents = 'none';
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
});
document.getElementById('pwa-dismiss').addEventListener('click', () => {
  pwaToast.style.opacity = '0'; pwaToast.style.pointerEvents = 'none';
});

window.addEventListener('resize', resize);
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
// init background
wrap.style.background = BACKGROUNDS[S.bgKey].css;
// resize after layout settles
requestAnimationFrame(() => { resize(); requestAnimationFrame(resize); });
